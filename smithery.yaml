name: license-checker-ai-mcp
description: License identification, compatibility checking, generation, and term
  explanation.
version: 1.0.0
tools:
- name: identify_license
  description: Identify the license type from license text content.
  parameters:
  - name: text
    type: string
    required: true
- name: check_compatibility
  description: Check if two licenses are compatible for combining code.
  parameters:
  - name: license_a
    type: string
    required: true
  - name: license_b
    type: string
    required: true
- name: generate_license
  description: Generate license text for common open source licenses.
  parameters:
  - name: license_type
    type: string
    required: true
  - name: author
    type: string
    required: true
  - name: year
    type: integer
    required: false
- name: explain_terms
  description: Explain the key terms and obligations of a license in plain language.
  parameters:
  - name: license_type
    type: string
    required: true
